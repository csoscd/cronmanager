################################################################################
# GitHub Actions – Build and push :dev Docker images on development branches
#
# Trigger: every push to any branch except main
#          (also available as manual dispatch for testing)
#
# Images produced:
#   cs1711/cronmanager-agent:dev
#   cs1711/cronmanager-web:dev
#
# The :dev tag is always overwritten – it reflects the state of whichever
# development branch was pushed to most recently.  It is intended for testing
# unreleased features and must not be used in production deployments.
#
# Required repository secrets (same as docker-release.yml):
#   DOCKERHUB_USERNAME   – Docker Hub account name (cs1711)
#   DOCKERHUB_TOKEN      – Docker Hub access token (read/write)
#
# @author  Christian Schulz <technik@meinetechnikwelt.rocks>
# @license GNU General Public License version 3 or later
################################################################################

name: Build and push dev Docker images

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual dev build (informational only)"
        required: false
        default: "Manual dev build"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push-dev:
    name: Build ${{ matrix.image }}:dev
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image:      cronmanager-agent
            dockerfile: docker/agent/Dockerfile
            context:    .
          - image:      cronmanager-web
            dockerfile: docker/web/Dockerfile
            context:    .

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Check out repository
        uses: actions/checkout@v4

      # ── Docker Buildx ───────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Docker Hub login ────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build and push :dev tag ─────────────────────────────────────────────
      - name: Build and push cs1711/${{ matrix.image }}:dev
        uses: docker/build-push-action@v6
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       true
          tags:       cs1711/${{ matrix.image }}:dev
          build-args: APP_VERSION=dev-${{ github.ref_name }}@${{ github.sha }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=Development build – not for production use
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms:  linux/amd64,linux/arm64

---
# Cronmanager – docker-compose.yml
# Deployment mode: host-agent
#
# Brings up the web UI and MariaDB containers.
# The host agent runs as a systemd service on the Docker host and is reached
# by the web container via host.docker.internal.
#
# Adjust volume paths to match your installation before deploying.
# Default install paths are shown below.
#
# Required environment variables (define in .env next to this file):
#   DB_NAME           – MariaDB database name
#   DB_USER           – MariaDB application user
#   DB_PASSWORD       – MariaDB application password
#   DB_ROOT_PASSWORD  – MariaDB root password
#
# @author  Christian Schulz <technik@meinetechnikwelt.rocks>
# @license GNU General Public License version 3 or later

services:

  # ---------------------------------------------------------------------------
  # Web UI (PHP-FPM + Nginx)
  # ---------------------------------------------------------------------------
  cronmanager-web:
    image: cs1711/cs_php-nginx-fpm:latest-alpine
    container_name: cronmanager-web
    restart: unless-stopped
    extra_hosts:
      # Allows the web container to reach the host agent on the Docker host
      - "host.docker.internal:host-gateway"
    environment:
      # Agent URL – update to https:// when the host agent runs with TLS enabled
      AGENT_URL:           "https://host.docker.internal:8865"
      AGENT_SSL_VERIFY:    "false"
      AGENT_SSL_CA_BUNDLE: ""
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/cronmanager/www/conf:/var/www/conf
      - /opt/cronmanager/www/html:/var/www/html
      - /opt/cronmanager/www/log:/var/www/log
      - /opt/phplib/vendor:/var/www/libs/vendor
    ports:
      - "8880:8080"
    networks:
      - cronmanager-internal
    depends_on:
      cronmanager-db:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.scope=doupdate"

  # ---------------------------------------------------------------------------
  # MariaDB Database
  # ---------------------------------------------------------------------------
  cronmanager-db:
    image: mariadb:lts
    container_name: cronmanager-db
    restart: unless-stopped
    volumes:
      - /opt/cronmanager/db/data:/var/lib/mysql
      - /opt/cronmanager/db/conf:/etc/mysql
      - /opt/cronmanager/db/log:/var/log/mysql
      - /opt/cronmanager/db/init:/docker-entrypoint-initdb.d
    ports:
      # Exposed to localhost only — required by the host agent (runs outside Docker)
      - "127.0.0.1:3306:3306"
    environment:
      MARIADB_DATABASE:      ${DB_NAME}
      MARIADB_USER:          ${DB_USER}
      MARIADB_PASSWORD:      ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - cronmanager-internal
    labels:
      - "com.centurylinklabs.watchtower.scope=doupdate"

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  cronmanager-internal:
    driver: bridge
